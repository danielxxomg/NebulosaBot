name: QA

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 0"  # Sundays 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONASYNCIODEBUG: "1"

jobs:
  qa-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Ruff check
        run: uv run ruff check bot/services/economy_service.py tests/conftest.py tests/property/ tests/test_economy_service.py tests/test_guild_service.py

      - name: Ruff format check
        run: uv run ruff format --check bot/services/economy_service.py tests/conftest.py tests/property/ tests/test_economy_service.py tests/test_guild_service.py

      - name: Mypy
        run: uv run mypy bot/services/economy_service.py tests/conftest.py tests/test_guild_service.py

      - name: Bandit
        run: uv run bandit -r bot/ -c pyproject.toml --severity-level medium

      - name: pip-audit
        run: uv run --with pip-audit pip-audit -l --strict

      - name: Tests with coverage
        run: uv run pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  pip-audit-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv sync --dev
      - run: uv run --with pip-audit pip-audit -l --strict
