name: QA

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 0"  # Sundays 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONASYNCIODEBUG: "1"

jobs:
  qa-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --extra dev

      - name: Ruff check
        run: uv run --extra dev ruff check bot/services/economy_service.py bot/config.py tests/conftest.py tests/property/ tests/test_economy_service.py tests/test_guild_service.py tests/test_config.py tests/test_database.py tests/test_sentinel_cog.py tests/test_tickets_cog.py tests/test_greeting_service.py bot/core/database.py bot/models/ticket.py bot/models/ticket_note.py tests/test_migrations.py tests/test_ticket_model.py tests/integration/ bot/services/ticket_service.py bot/cogs/tickets.py tests/test_ticket_service.py

      - name: Ruff format check
        run: uv run --extra dev ruff format --check bot/services/economy_service.py bot/config.py tests/conftest.py tests/property/ tests/test_economy_service.py tests/test_guild_service.py tests/test_config.py tests/test_database.py tests/test_sentinel_cog.py tests/test_tickets_cog.py tests/test_greeting_service.py bot/models/ticket.py bot/models/ticket_note.py tests/test_migrations.py tests/test_ticket_model.py tests/integration/ bot/services/ticket_service.py tests/test_ticket_service.py

      - name: Mypy
        run: uv run --extra dev mypy --follow-imports=silent bot/services/economy_service.py bot/config.py tests/conftest.py tests/test_guild_service.py tests/test_config.py tests/test_database.py bot/core/database.py bot/models/ticket.py bot/models/ticket_note.py tests/test_migrations.py tests/test_ticket_model.py bot/services/ticket_service.py bot/cogs/tickets.py tests/test_ticket_service.py

      - name: Bandit
        run: uv run --extra dev bandit -r bot/ -c pyproject.toml --severity-level medium

      - name: pip-audit
        run: uv run --extra dev --with pip-audit pip-audit -l --strict

      - name: Tests with coverage
        run: uv run --extra dev pytest --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  dashboard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci

      - name: Type check
        run: cd dashboard && npx tsc --noEmit

      - name: Tests
        run: cd dashboard && npx vitest run

  pip-audit-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv sync --extra dev
      - run: uv run --extra dev --with pip-audit pip-audit -l --strict
