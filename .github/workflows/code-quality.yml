name: Code Quality (Report Only)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: jscpd — duplication report
        continue-on-error: true
        run: |
          npx jscpd bot/ --threshold 5 --reporters console
          npx jscpd tests/ --threshold 10 --reporters console

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: vulture — dead code report
        continue-on-error: true
        run: |
          pip install vulture
          vulture bot/ --min-confidence 80
