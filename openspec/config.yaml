schema: spec-driven

context: |
  Project: NebulosaBot — Discord bot with web dashboard
  Stack: Python (bot), Next.js (dashboard), Supabase/PostgreSQL (DB)
  Architecture: Cache-first with webhook invalidation, modular command system
  Modules: Core, Tickets, Moderation (Sentinel), Economy (Stellar), Utility
  Status: Implemented — 7 cogs, 8 services, 2 listeners, 24 hybrid commands, 384 tests, 74.59% coverage
  Diagrams: 4 Mermaid/PlantUML design docs in /Diagramas
  Language: Spanish (design docs), English (code artifacts)

strict_tdd: true

testing:
  runner: pytest
  command: "uv run pytest"
  framework: pytest-asyncio
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: true
    command: "uv run pytest --cov=bot --cov-report=term"
    current: 0.7459
  quality:
    linter: ruff
    type_checker: mypy
    formatter: ruff

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference design diagrams in /Diagramas when relevant
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Follow cache-first + webhook invalidation pattern from design docs
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    - Strict TDD: write tests FIRST, then implement
    tdd: true
    test_command: "uv run pytest"
  verify:
    test_command: "uv run pytest"
    build_command: "python -m py_compile bot/__main__.py"
    coverage_threshold: 0.70
  archive:
    - Warn before merging destructive deltas

session:
  chained_pr_strategy: ask-always
  review_budget_lines: 400
