# .pre-commit-config.yaml — rama-c-qa-tooling
# Order: fast → slow. SKIP=<hook-id> to bypass per-commit.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: "^(bot/|tests/)"
      - id: ruff-format
        args: [--check]
        files: "^(bot/|tests/)"

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: true
        files: "^(bot/|tests/)"

      - id: bandit
        name: bandit
        entry: bandit -r bot/ -c pyproject.toml --severity-level medium
        language: system
        pass_filenames: false
        files: ^bot/.*\.py$

      - id: gga
        name: gga
        entry: ./.gga
        language: script
        always_run: true
        verbose: true
        pass_filenames: false
